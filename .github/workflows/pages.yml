name: Deploy demo to GitHub Pages

# Builds the apps/web dashboard as a fully static, self-contained live demo
# (VITE_DEMO=1 swaps in an in-browser mock backend) and publishes it to Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # redis-memory-server is test-only; skip its binary download on install.
      REDISMS_DISABLE_POSTINSTALL: "1"
    steps:
      - uses: actions/checkout@v4

      # No `version:` — the action reads pnpm@9.15.0 from package.json's
      # packageManager field; specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static demo
        run: pnpm --filter @bullwatch/web build:demo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
