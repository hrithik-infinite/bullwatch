name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Point the integration tests at the Redis service instead of downloading
      # an in-process redis-memory-server binary.
      REDIS_URL: redis://localhost:6379
      REDISMS_DISABLE_POSTINSTALL: "1"

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads pnpm@9.15.0 from package.json's
      # packageManager field; specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit + integration tests
        run: pnpm test

      - name: No-network gate (shipped bundles make zero external calls)
        run: pnpm check:no-network

  # TODO: payload-at-rest integration gate — boots the server against a Redis
  # service container, runs a workload with sentinel strings in job payloads,
  # then asserts those strings appear in NO key outside `bull:*` and nowhere on
  # disk. Added once the server + memory/redis stores land.
